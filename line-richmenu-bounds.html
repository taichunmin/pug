<!doctype html><html><head><meta charset="UTF-8"><meta content="IE=edge" http-equiv="X-UA-Compatible"><meta content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no" name="viewport"><title></title><script src="https://www.googletagmanager.com/gtag/js?id=UA-39556213-3" async></script><script>function gtag(){dataLayer.push(arguments)}window.dataLayer=window.dataLayer||[],gtag("js",new Date),gtag("config","UA-39556213-3");</script><link href="https://cdn.jsdelivr.net/npm/bootstrap@4/dist/css/bootstrap.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/font-awesome@4/css/font-awesome.min.css" rel="stylesheet"><link href="https://cdn.jsdelivr.net/npm/prismjs@1/themes/prism-tomorrow.min.css" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet"><style>[v-cloak]{display:none}.richmenu{position:relative;overflow:hidden;height:0;background-repeat:no-repeat;background-size:cover;border:1px dashed gray}.area{border:1px dashed red;color:red;font-size:.8rem;position:absolute}.input-group-sm .input-group-text{letter-spacing:-1px;min-width:5rem}</style></head><body><div class="container py-3 text-monospace" id="app" v-cloak><div class="row mb-3"><div class="col was-validated"><div class="input-group input-group-sm mb-2"><div class="input-group-prepend"><span class="input-group-text justify-content-end">image</span></div><input class="form-control" required type="url" v-model="h.image" inputmode="url" pattern="(https?|line)://.+"></div><div class="row mx-n1 mb-2"><div class="col px-1"><div class="input-group input-group-sm"><div class="input-group-prepend"><span class="input-group-text justify-content-end">imgWidth</span></div><input class="form-control" required type="number" v-model="h.imgWidth"></div></div><div class="col px-1"><div class="input-group input-group-sm"><div class="input-group-prepend"><span class="input-group-text justify-content-end">imgHeight</span></div><input class="form-control" required type="number" v-model="h.imgHeight"></div></div></div><div class="row mx-n1 mb-2"><div class="col px-1"><div class="input-group input-group-sm"><div class="input-group-prepend"><span class="input-group-text justify-content-end">x</span></div><input class="form-control" required type="number" v-model="h.area1.x"></div></div><div class="col px-1"><div class="input-group input-group-sm"><div class="input-group-prepend"><span class="input-group-text justify-content-end">y</span></div><input class="form-control" required type="number" v-model="h.area1.y"></div></div></div><div class="row mx-n1"><div class="col px-1"><div class="input-group input-group-sm"><div class="input-group-prepend"><span class="input-group-text justify-content-end">width</span></div><input class="form-control" required type="number" v-model="h.area1.width"></div></div><div class="col px-1"><div class="input-group input-group-sm"><div class="input-group-prepend"><span class="input-group-text justify-content-end">height</span></div><input class="form-control" required type="number" v-model="h.area1.height"></div></div></div></div><div class="col d-flex flex-column"><div class="input-group input-group-sm flex-fill"><div class="input-group-prepend"><span class="input-group-text justify-content-end text-right">areas<br>csv</span></div><textarea class="form-control form-control-sm" id="areas" v-model="h.areas"></textarea></div></div></div><div class="richmenu" :style="styleRichmenu"><div class="area" :style="styleArea(h.area1)"></div><div class="area align-items-center d-flex justify-content-center" :style="styleArea(area)" v-for="area in areas">{{ area.x }},{{ area.y }},{{ area.width }},{{ area.height }}</div></div></div><script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script><script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script><script src="https://cdn.jsdelivr.net/npm/jquery@3/dist/jquery.min.js"></script><script src="https://cdn.jsdelivr.net/npm/json5@2/dist/index.min.js"></script><script src="https://cdn.jsdelivr.net/npm/lodash@4/lodash.min.js"></script><script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script><script src="https://cdn.jsdelivr.net/npm/popper.js@1/dist/umd/popper.min.js"></script><script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-core.min.js"></script><script src="https://cdn.jsdelivr.net/npm/prismjs@1/plugins/autoloader/prism-autoloader.min.js"></script><script src="https://cdn.jsdelivr.net/npm/qs@6/dist/qs.min.js"></script><script src="https://cdn.jsdelivr.net/npm/sweetalert2@10"></script><script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script><script src="https://cdn.jsdelivr.net/npm/bootstrap@4/dist/js/bootstrap.min.js"></script><script>window.areasToCsv=t=>Papa.unparse(_.map(t,"bounds"),{header:!0}),window.vm=new Vue({el:"#app",data:{h:{areas:"",image:"https://i.imgur.com/uTSeCeQ.png",imgHeight:400,imgWidth:800,area1:{height:400,width:800,x:0,y:0}}},async mounted(){try{var t=JSON5.parse(localStorage.getItem(location.pathname));t&&this.$set(this,"h",{...this.h,...t})}catch(t){}this.$watch("h",()=>{localStorage.setItem(location.pathname,JSON5.stringify(this.h))},{deep:!0})},computed:{styleRichmenu(){return{backgroundImage:`url(${this.h.image})`,paddingTop:`${this.h.imgHeight/this.h.imgWidth*100}%`}},areas(){try{return _.get(Papa.parse(_.trim(this.h.areas),{encoding:"utf8",header:!0}),"data",[])}catch(t){return[]}}},methods:{styleArea(t){return{top:`${t.y/this.h.imgHeight*100}%`,left:`${t.x/this.h.imgWidth*100}%`,width:`${t.width/this.h.imgWidth*100}%`,height:`${t.height/this.h.imgHeight*100}%`}}}});</script></body></html>
